name: PDPA Retention Cleanup
on:
  schedule:
    - cron: '0 19 * * *'   # ทุกคืน 02:00 Bangkok time (UTC+7)
  workflow_dispatch:        # รันมือได้จาก GitHub Actions tab

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Run PDPA cleanup function
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.SUPABASE_FUNCTION_URL }}/pdpa-cleanup" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Cleanup failed with status $HTTP_CODE"
            exit 1
          fi

          echo "PDPA cleanup completed successfully"
